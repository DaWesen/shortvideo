version: '3'
services:
  # 基础服务
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  etcd:
    image: ccr.ccs.tencentyun.com/sub-space/etcd:latest
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      ETCD_LISTEN_CLIENT_URLS: ${ETCD_LISTEN_CLIENT_URLS}
      ETCD_ADVERTISE_CLIENT_URLS: ${ETCD_ADVERTISE_CLIENT_URLS}
    restart: unless-stopped

  zookeeper:
    image: wurstmeister/zookeeper:latest
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: wurstmeister/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
      - xpack.security.enabled=false
    restart: unless-stopped

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # 微服务
  gateway:
    build:
      context: .
      args:
        SERVICE: gateway
        PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - etcd
    restart: unless-stopped

  user:
    build:
      context: .
      args:
        SERVICE: user
        PORT: 8881
    ports:
      - "8881:8881"
    depends_on:
      - etcd
      - postgres
      - redis
    restart: unless-stopped

  video:
    build:
      context: .
      args:
        SERVICE: video
        PORT: 8882
    ports:
      - "8882:8882"
    depends_on:
      - etcd
      - postgres
      - minio
    restart: unless-stopped

  social:
    build:
      context: .
      args:
        SERVICE: social
        PORT: 8883
    ports:
      - "8883:8883"
    depends_on:
      - etcd
      - postgres
    restart: unless-stopped

  interaction:
    build:
      context: .
      args:
        SERVICE: interaction
        PORT: 8884
    ports:
      - "8884:8884"
    depends_on:
      - etcd
      - postgres
      - redis
    restart: unless-stopped

  message:
    build:
      context: .
      args:
        SERVICE: message
        PORT: 8885
    ports:
      - "8885:8885"
    depends_on:
      - etcd
      - postgres
      - kafka
    restart: unless-stopped

  live:
    build:
      context: .
      args:
        SERVICE: live
        PORT: 8886
    ports:
      - "8886:8886"
    depends_on:
      - etcd
      - postgres
    restart: unless-stopped

  danmu:
    build:
      context: .
      args:
        SERVICE: danmu
        PORT: 8887
    ports:
      - "8887:8887"
    depends_on:
      - etcd
      - postgres
      - kafka
    restart: unless-stopped

  recommend:
    build:
      context: .
      args:
        SERVICE: recommend
        PORT: 8888
    ports:
      - "8888:8888"
    depends_on:
      - etcd
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
